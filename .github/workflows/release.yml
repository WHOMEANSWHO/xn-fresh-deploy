name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Self test
        run: dotnet run --project XnFreshDeploy.Native/XnFreshDeploy.Native.csproj -c Release -- --self-test

      - name: Integration test
        run: |
          dotnet publish XnFreshDeploy.Native/XnFreshDeploy.Native.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish-test
          ./publish-test/XnFreshDeploy.exe --integration-test

      - name: Build release ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version)) { $version = '4.1' }
          ./Build-NativeRelease.ps1 -Version $version -SkipIntegrationTest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XnFreshDeploy-release
          path: XnFreshDeploy-v*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: XnFreshDeploy-v*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
