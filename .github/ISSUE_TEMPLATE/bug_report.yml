name: Bug report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open app\n2. Click Play on profile\n3. ..."
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "4.1.1"
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
  - type: textarea
    id: logs
    attributes:
      label: Crash log (from logs/ folder, if any)
      render: shell
